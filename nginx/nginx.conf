worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Use Docker's internal DNS resolver for service name resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Upstream using variable forces runtime DNS resolution
    # (plain 'upstream' with server names fails if containers aren't up at nginx start)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # Max upload size for Moodle file submissions
        client_max_body_size 50M;

        # Timeouts for long-running Moodle operations
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        location / {
            # Resolve Moodle service name at request time
            set $moodle_backend "http://moodle:8080";

            proxy_pass $moodle_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
